    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d0e12;
            --card-bg: rgba(20, 22, 30, 0.75);
            --card-border: rgba(147, 112, 219, 0.25);
            --accent-purple: #a855f7;
            --accent-cyan: #06b6d4;
            --accent-pink: #ec4899;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --btn-bg: rgba(30, 34, 48, 0.6);
            --btn-hover: rgba(168, 85, 247, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(168, 85, 247, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(6, 182, 212, 0.12) 0%, transparent 40%);
            overflow-x: hidden;
            padding: 20px;
        }

        /* Scanline effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 10;
            background-size: 100% 3px, 6px 100%;
            pointer-events: none;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 36px 28px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), 0 0 30px rgba(168, 85, 247, 0.1);
            position: relative;
            z-index: 1;
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 28px;
        }

        .avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 16px auto;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--accent-purple);
            box-shadow: 0 0 20px rgba(168, 85, 247, 0.4);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .avatar-wrapper:hover .avatar {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.6);
            border-color: var(--accent-cyan);
        }

        .status-badge {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 14px;
            height: 14px;
            background-color: #10b981;
            border: 2.5px solid var(--bg-color);
            border-radius: 50%;
        }

        .title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #fff 30%, var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .handle {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem;
            color: var(--accent-cyan);
            opacity: 0.9;
            margin-bottom: 12px;
        }

        .bio {
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 16px;
        }

        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px;
            margin-bottom: 24px;
        }

        .tag {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(168, 85, 247, 0.1);
            color: #d8b4fe;
            border: 1px solid rgba(168, 85, 247, 0.2);
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-link {
            display: flex;
            align-items: center;
            padding: 14px 18px;
            background: var(--btn-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .btn-link i {
            font-size: 1.25rem;
            width: 28px;
            margin-right: 12px;
            text-align: center;
            transition: transform 0.25s ease;
        }

        .btn-link .link-text {
            flex-grow: 1;
        }

        .btn-link .arrow {
            font-size: 0.85rem;
            opacity: 0.4;
            transition: transform 0.25s ease, opacity 0.25s ease;
        }

        /* Specific Link Colors & Hover Effects */
        .btn-link:hover {
            background: var(--btn-hover);
            border-color: var(--accent-purple);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3), 0 0 15px rgba(168, 85, 247, 0.2);
        }

        .btn-link:hover i {
            transform: scale(1.15);
        }

        .btn-link:hover .arrow {
            opacity: 1;
            transform: translateX(4px);
            color: var(--accent-purple);
        }

        /* Individual Platform Styles */
        .btn-tg i { color: #2ea6da; }
        .btn-tg-vpn i { color: #a855f7; }
        .btn-steam i { color: #66c0f4; }
        .btn-discord i { color: #5865f2; }
        .btn-github i { color: #ffffff; }

        .footer {

            text-align: center;
            font-size: 0.75rem;
            color: rgba(156, 163, 175, 0.5);
            font-family: 'JetBrains Mono', monospace;
        }

        .footer a {
            color: var(--text-muted);
            text-decoration: none;
        }

        .footer a:hover {
            color: var(--accent-cyan);
        }
    </style>
</head>
